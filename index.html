<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pizza Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        model-viewer { width: 100%; flex-grow: 1; --poster-color: transparent; }
        .ar-button {
            background-color: #ff5500; color: white; border: none; border-radius: 50px;
            padding: 15px 30px; font-weight: bold; position: absolute; bottom: 30px;
            left: 50%; transform: translateX(-50%); cursor: pointer;
        }
    </style>
</head>
<body>
    <model-viewer 
        src="models/pizza.glb" 
        ar 
        ar-modes="scene-viewer webxr quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1">
        <button slot="ar-button" class="ar-button">VIEW IN YOUR ROOM</button>
    </model-viewer>
</body>
</html>
